version: 2

models:
  - name: int_order_items_enriched
    description: "A wide table combining order items with orders. The grain is order_item_id. This model serves as the foundation for downstream GMV and product margin calculations."
    columns:
      - name: order_item_id
        description: "The primary key for the order item."
        tests:
          - unique
          - not_null
          
  - name: int_sessions_aggregated
    description: "Aggregates raw event logs into session-level data. It records funnel conversion status and timestamps for each user journey. The grain is session_id."
    columns:
      - name: session_id
        tests:
          - unique
          - not_null

  - name: int_user_order_metrics
    description: "Aggregates user purchase behavior. It calculates LTV, margin, and order frequency across various rolling time windows (e.g., 7d, 30d, 90d). The grain is user_id."
    columns:
      - name: user_id
        tests:
          - unique
          - not_null