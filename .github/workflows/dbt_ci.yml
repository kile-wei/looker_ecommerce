name: dbt CI

on:
  pull_request:
    branches:
      - main

jobs:
  dbt-ci:
    name: dbt compile and build
    runs-on: ubuntu-latest

    env:
      DBT_PROFILES_DIR: ./.github/dbt
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      BQ_CI_DATASET: dbt_ci_pr_${{ github.event.pull_request.number }}

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt-bigquery
        run: |
          python -m pip install --upgrade pip
          pip install dbt-bigquery

      - name: Create BigQuery keyfile
        run: |
          mkdir -p ./.github/dbt
          echo '${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}' > ./.github/dbt/gcp_keyfile.json

      - name: Create dbt profiles.yml
        run: |
          cat > ./.github/dbt/profiles.yml <<EOF
          default:
            target: ci
            outputs:
              ci:
                type: bigquery
                method: service-account
                project: ${GCP_PROJECT_ID}
                dataset: ${BQ_CI_DATASET}
                keyfile: ./.github/dbt/gcp_keyfile.json
                threads: 4
                timeout_seconds: 300
                location: US
          EOF

      - name: Install dbt packages
        run: dbt deps

      - name: Compile dbt project
        run: dbt compile --target ci

      - name: Build dbt project
        run: dbt build --target ci
