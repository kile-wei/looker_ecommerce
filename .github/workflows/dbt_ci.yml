name: dbt CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  dbt-ci:
    name: dbt compile and build
    runs-on: ubuntu-latest

    env:
      DBT_PROFILES_DIR: ./.github/dbt
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      BQ_CI_DATASET: dbt_ci_pr_${{ github.event.pull_request.number }}_${{ github.run_id }}

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt-bigquery
        run: |
          python -m pip install --upgrade pip
          pip install dbt-bigquery==1.11.3

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: '${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}'
          project_id: '${{ secrets.GCP_PROJECT_ID }}'

      - name: Set up Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: '${{ secrets.GCP_PROJECT_ID }}'

      - name: Create dbt profiles.yml
        run: |
          mkdir -p ./.github/dbt
          cat > ./.github/dbt/profiles.yml <<EOF
          default:
            target: ci
            outputs:
              ci:
                type: bigquery
                method: service-account
                project: ${GCP_PROJECT_ID}
                dataset: ${BQ_CI_DATASET}
                keyfile: ${{ steps.auth.outputs.credentials_file_path }}
                threads: 4
                timeout_seconds: 300
                location: US
          EOF

      - name: Install dbt packages
        run: dbt deps

      - name: Compile dbt project
        run: dbt compile --target ci

      - name: Build dbt project
        run: dbt build --target ci

      - name: Test incremental execution
        run: |
          dbt build \
            --target ci \
            --select fct_order_items fct_sessions

      - name: Check source freshness
        run: dbt source freshness --target ci

      - name: Clean up CI datasets
        if: always()
        run: |
          for DATASET in \
            "${BQ_CI_DATASET}" \
            "${BQ_CI_DATASET}_staging" \
            "${BQ_CI_DATASET}_intermediate" \
            "${BQ_CI_DATASET}_marts"
          do
            echo "Deleting ${DATASET}"

            bq rm \
              --recursive \
              --force \
              "${GCP_PROJECT_ID}:${DATASET}" || true
          done